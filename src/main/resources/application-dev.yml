spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/moneylog}
    username: ${SPRING_DATASOURCE_USERNAME:moneylog}
    password: ${SPRING_DATASOURCE_PASSWORD:moneylog}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

security:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-key-at-least-32bytes}
    access-token-exp-seconds: ${JWT_ACCESS_EXP_SECONDS:1800}
    refresh-token-exp-seconds: ${JWT_REFRESH_EXP_SECONDS:1209600}
