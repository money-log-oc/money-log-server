spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-exp-seconds: ${JWT_ACCESS_EXP_SECONDS:1800}
    refresh-token-exp-seconds: ${JWT_REFRESH_EXP_SECONDS:1209600}
